<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0" >
    <title>ONG Determinación, contacto</title>
</head>
<body>
    <header>
        <h1>Información de contacto</h1> 
        <nav><ul>

            <li><a href="./index.html">Inicio</a></li>   
            <li><a href="./programas.html">Programas</a></li>  
            <li><a href="./Nosotros.html">Nosotros</a></li>  


            </ul> </nav>   
    </header>
    <main>
        <section id="direccion">
            <h2>Dirección</h2>
            <p> 
                <a href="https://www.google.com/maps" target="_blank">
                    Av. Los Angeles 123, Buenos Aires, Argentina
                </a>
            </p>
        </section>

        <section id="telefono">
            <h2>Teléfono</h2>
            <p>
                <a href="tel: +541123456789">
                    Llamar al +54 11 2345-6789
                </a>
            </p>
         </section id="email">
            
        <section>
            <h2>Email</h2>
            <p>
                <a href="mailto:contacto@ongdeterminacion.org">
                    contacto@ongdeterminacion.org
                </a>
            </p>
        </section>
        <section id="redes">
            <h2>Red social</h2>
            <p>
                <a href="@usuario_ficticio">
                     Visitanos en nuestra red social
                </a>
            </p>

        </section>
        <h2>Sumate como voluntario</h2>
        <p>Completa el formulario</p>
        <form action="#" method="post">
            <label for="nombre"> Nombre y apellido</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej: Agustina Martinez" required>
            <br>
            <label for="email"> Email</label>
            <input type="email" name="email" id="email" required>
            <br>
            <label for="tel">Teléfono</label>
            <input type="tel" name="telefono" id="telefono" placeholder="+54 9 1134567890" required>
            <br>
            <button type="submit">Enviar</button>
        </form>
    </main>
</body>
</html>
